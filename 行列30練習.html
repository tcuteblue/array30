<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">

        /* 核心黑科技：隱藏密碼框，強制攔截系統中文輸入法 */
        #ime-bypass { position: absolute; opacity: 0; top: -100px; left: -100px; width: 1px; height: 1px; z-index: -1; }

        .navbar { width: 100%; background: var(--primary); padding: 15px 0; display: flex; justify-content: center; gap: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 10; }
        .nav-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px 20px; border-radius: 8px; font-size: 16px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .nav-btn:hover { background: rgba(255,255,255,0.2); }
        .nav-btn.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 10px rgba(52, 152, 219, 0.5); }

        .container { background: white; width: 850px; margin-top: 30px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center; position: relative; }
        
        .controls { display: flex; gap: 20px; background: #edf2f7; padding: 15px; border-radius: 12px; margin-bottom: 20px; align-items: center; width: 100%; justify-content: center; box-sizing: border-box; }
        .btn { padding: 12px 25px; border-radius: 8px; font-size: 16px; cursor: pointer; border: none; font-weight: bold; transition: 0.2s; color: white; }
        .btn-practice { background: var(--success); }
        .btn-exam { background: #e67e22; }
        .btn:hover { filter: brightness(1.1); transform: translateY(-2px); }
        
        .display-zone { height: 180px; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fafafa; border: 3px dashed #cbd5e0; border-radius: 15px; position: relative; }
        .root-text { font-size: 90px; font-weight: bold; color: var(--text); letter-spacing: 5px; }
        .root-img { max-height: 140px; max-width: 140px; object-fit: contain; }
        .typing-progress { color: #aaa; font-size: 45px; letter-spacing: 6px; margin-top: 10px; font-family: monospace; font-weight: bold; }
        .typing-progress span.done { color: var(--success); }
        
        .hint-box { position: absolute; top: 10px; left: 15px; font-size: 18px; color: #7f8c8d; font-weight: bold; background: #eee; padding: 5px 15px; border-radius: 8px; }
        .exam-feedback { position: absolute; bottom: 10px; font-size: 20px; font-weight: bold; opacity: 0; transition: opacity 0.3s; }
        
        .keyboard { margin-top: 25px; display: flex; flex-direction: column; gap: 8px; background: #e2e8f0; padding: 20px; border-radius: 15px; transition: 0.3s; }
        .kb-row { display: flex; justify-content: center; gap: 8px; }
        .key { width: 50px; height: 50px; background: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; color: #555; box-shadow: 0 4px 0 #cbd5e0; transition: 0.1s; }
        .key.active { background: var(--accent); color: white; box-shadow: 0 0 0 #2980b9; transform: translateY(4px); }
        .key.hint-glow { border: 3px solid #f1c40f; background: #fff9e6; color: #d35400; }
        .space-bar { width: 300px; }

        .stats { display: flex; justify-content: space-around; width: 100%; margin-top: 25px; padding: 15px; background: var(--primary); color: white; border-radius: 10px; font-size: 18px; box-sizing: border-box; align-items: center; }
        .stat-val { font-weight: bold; font-size: 24px; color: #ecf0f1; }
        
        /* 智慧計時器樣式 */
        .timer-box { font-size: 22px; display: flex; align-items: center; gap: 10px; }
        .timer-val { font-weight: bold; font-size: 28px; color: #f1c40f; font-family: monospace; }
        .status-badge { font-size: 14px; padding: 3px 8px; border-radius: 5px; background: var(--success); color: white; font-weight: bold; }
        .status-badge.paused { background: var(--warning); }
        
        .result-modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); border-radius: 20px; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .grade { font-size: 80px; font-weight: bold; margin: 10px 0; }

        .global-hint { margin-top: 15px; color: var(--success); font-size: 16px; font-weight: bold; }

</head>

        { char: '有', keys: ['Z','U','SPACE'], hint: '𠂇(18) 月(71) -> Z U' },
        { char: '不', keys: ['Z','SPACE'], hint: '不(16) -> Z' },
        { char: '可', keys: ['Q','SPACE'], hint: '可(10) -> Q' },
        { char: '以', keys: ['X','SPACE'], hint: '以(26) -> X' },
        { char: '中', keys: [';','D','SPACE'], hint: '口(0-) 丨(3-) -> ; D' },
        { char: '心', keys: ['N','SPACE'], hint: '心(66) -> N' },
        { char: '見', keys: ['J','S','SPACE'], hint: '目(7-) 儿(2-) -> J S' },
        { char: '去', keys: ['R','X','SPACE'], hint: '土(41) 厶(26) -> R X' },
        { char: '正', keys: ['A','E','SPACE'], hint: '一(1-) 止(32) -> A E' },
        { char: '安', keys: ['N','W','SPACE'], hint: '宀(67) 女(21) -> N W' },
        { char: '全', keys: ['K','SPACE'], hint: '全(8-) -> K' },
        { char: '公', keys: ['K','X','SPACE'], hint: '八(8-) 厶(26) -> K X' },
        { char: '司', keys: ['B','A',';','SPACE'], hint: '尸(59) 一(1-) 口(0-) -> B A ;' },
        { char: '言', keys: ['Y','SPACE'], hint: '言(60) -> Y' }
    ];
    let chiQuizList = chineseDict.map(d => ({ content: d.char, keys: d.keys, hint: `精確拆解: ${d.hint}` }));

    // ==========================================
    // 2. 系統核心控制 (輸入法攔截、鍵位對應)
    // ==========================================
    const imeBypass = document.getElementById('ime-bypass');
    function forceFocus() { imeBypass.focus(); }
    document.addEventListener('click', forceFocus);
    setInterval(forceFocus, 1000); // 確保焦點絕對不丟失

    const keyMap = {
        'KeyQ':'Q', 'KeyW':'W', 'KeyE':'E', 'KeyR':'R', 'KeyT':'T', 'KeyY':'Y', 'KeyU':'U', 'KeyI':'I', 'KeyO':'O', 'KeyP':'P',
        'KeyA':'A', 'KeyS':'S', 'KeyD':'D', 'KeyF':'F', 'KeyG':'G', 'KeyH':'H', 'KeyJ':'J', 'KeyK':'K', 'KeyL':'L', 'Semicolon':';',
        'KeyZ':'Z', 'KeyX':'X', 'KeyC':'C', 'KeyV':'V', 'KeyB':'B', 'KeyN':'N', 'KeyM':'M', 'Comma':',', 'Period':'.', 'Slash':'/',
        'Space':'SPACE'
    };

    let currentCategory = 'roots';
    let currentMode = 'idle';
    let score = 0, attempts = 0;
    let currentQ = null;
    let currentKeyIndex = 0;
    
    // 計時器變數
    let practiceTime = 0, practiceInterval; 
    let idleTimeout, isIdle = false;
    let examTimeLeft = 0, examInterval;

    const uiDisplay = document.getElementById('content-area');
    const uiProgress = document.getElementById('progress-area');
    const uiHint = document.getElementById('hint-box');
    const uiFeedback = document.getElementById('exam-feedback');
    const kbElement = document.getElementById('keyboard');
    const timerContainer = document.getElementById('timer-container');
    const timerDisplay = document.getElementById('timer');
    const timerStatus = document.getElementById('timer-status');

    // ==========================================
    // 3. 遊戲流程控制
    // ==========================================
    window.switchCategory = function(cat) {
        if(currentMode !== 'idle') endGame(true);
        currentCategory = cat;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        uiDisplay.innerHTML = `<span class="root-text" style="color:#aaa; font-size:30px;">已切換至 ${event.target.innerText}<br>點擊按鈕開始</span>`;
        uiProgress.innerHTML = ''; uiHint.style.display = 'none'; clearKbHighlights();
        forceFocus();
    }

    window.startGame = function(mode) {
        currentMode = mode;
        score = 0; attempts = 0; currentKeyIndex = 0;
        updateStats();
        uiFeedback.style.opacity = 0;
        document.getElementById('result-modal').style.display = 'none';
        timerContainer.style.display = 'flex';
        forceFocus();

        if(mode === 'practice') {
            document.getElementById('timer-label').textContent = "專注時間:";
            timerStatus.style.display = 'inline-block';
            timerStatus.className = 'status-badge';
            timerStatus.textContent = "等待輸入";
            practiceTime = 0;
            timerDisplay.textContent = "00:00";
            uiHint.style.display = 'block';
            kbElement.style.opacity = 1;
            clearInterval(practiceInterval);
            practiceInterval = null; // 等待第一次按鍵才開始計時
        } else if(mode === 'exam') {
            document.getElementById('timer-label').textContent = "倒數計時:";
            timerStatus.style.display = 'none';
            examTimeLeft = parseInt(document.getElementById('exam-time').value) || 60;
            updateTimerDisplay(examTimeLeft);
            uiHint.style.display = 'none';
            kbElement.style.opacity = 0.2;
            
            clearInterval(examInterval);
            examInterval = setInterval(() => {
                examTimeLeft--;
                updateTimerDisplay(examTimeLeft);
                if(examTimeLeft <= 0) endGame(false);
            }, 1000);
        }
        nextQuestion();
    }

    function updateTimerDisplay(seconds) {
        let m = Math.floor(seconds / 60).toString().padStart(2, '0');
        let s = (seconds % 60).toString().padStart(2, '0');
        timerDisplay.textContent = `${m}:${s}`;
    }

    function nextQuestion() {
        currentKeyIndex = 0;
        let list;
        if(currentCategory === 'roots') list = rootQuizList;
        else if(currentCategory === 'chinese') list = chiQuizList;
        else {
            // 英文模式判斷：練習出肌肉題，考試出單字
            list = (currentMode === 'practice') ? engMuscleList : engWordsList;
        }

        currentQ = list[Math.floor(Math.random() * list.length)];
        
        uiDisplay.innerHTML = '';
        if(currentQ.content.endsWith('.png')) {
            const img = document.createElement('img');
            img.src = currentQ.content; img.className = 'root-img';
            img.onerror = () => uiDisplay.innerHTML = `<span style="font-size:16px;color:red">找不到圖片: ${currentQ.content}</span>`;
            uiDisplay.appendChild(img);
        } else {
            uiDisplay.innerHTML = `<span class="root-text">${currentQ.content}</span>`;
        }
        
        renderProgress();
        
        if(currentMode === 'practice') {
            uiHint.innerHTML = currentQ.hint;
            highlightKey(currentQ.keys[0]);
        } else {
            clearKbHighlights();
        }
    }

    function renderProgress() {
        if(currentCategory === 'roots') { uiProgress.innerHTML = ''; return; }
        let html = '';
        currentQ.keys.forEach((k, idx) => {
            let displayChar = k === 'SPACE' ? '␣' : k;
            if(idx < currentKeyIndex) html += `<span class="done">${displayChar}</span>`;
            else html += `<span>${displayChar}</span>`;
        });
        uiProgress.innerHTML = html;
    }

    // ==========================================
    // 4. 按鍵監聽與計時器邏輯
    // ==========================================
    imeBypass.addEventListener('keydown', (e) => {
        if(currentMode === 'idle') return;
        if(e.ctrlKey || e.altKey || e.metaKey) return;
        
        let mappedKey = keyMap[e.code];
        if(!mappedKey) return;
        
        e.preventDefault(); 
        imeBypass.value = ''; 

        // 智慧計時器處理 (無限練習專用)
        if(currentMode === 'practice') {
            if(isIdle || !practiceInterval) {
                // 恢復或啟動計時
                isIdle = false;
                timerStatus.className = 'status-badge';
                timerStatus.textContent = "進行中";
                if(!practiceInterval) {
                    practiceInterval = setInterval(() => {
                        if(!isIdle) { practiceTime++; updateTimerDisplay(practiceTime); }
                    }, 1000);
                }
            }
            // 每次按鍵重置閒置倒數 (3秒)
            clearTimeout(idleTimeout);
            idleTimeout = setTimeout(() => {
                isIdle = true;
                timerStatus.className = 'status-badge paused';
                timerStatus.textContent = "暫停中⏸️";
            }, 3000);
        }

        // 視覺回饋
        let keyEl = document.getElementById('key-' + mappedKey);
        if(keyEl) {
            keyEl.classList.add('active');
            setTimeout(() => keyEl.classList.remove('active'), 100);
        }
        checkInput(mappedKey);
    });

    function checkInput(inputKey) {
        attempts++;
        let targetKey = currentQ.keys[currentKeyIndex];
        
        if(inputKey === targetKey) {
            currentKeyIndex++;
            if(currentKeyIndex >= currentQ.keys.length) {
                score++;
                if(currentMode === 'exam') showExamFeedback(true, `上題解答: ${currentQ.hint}`);
                nextQuestion();
            } else {
                renderProgress();
                if(currentMode === 'practice') highlightKey(currentQ.keys[currentKeyIndex]);
            }
        } else {
            if(currentMode === 'exam') {
                showExamFeedback(false, `錯了！上題應為: ${currentQ.hint}`);
                nextQuestion(); 
            } else {
                uiFeedback.innerHTML = "<span style='color:var(--error)'>再試試！</span>";
                uiFeedback.style.opacity = 1;
                setTimeout(() => uiFeedback.style.opacity = 0, 500);
            }
        }
        updateStats();
    }

    function showExamFeedback(isCorrect, msg) {
        uiFeedback.innerHTML = `<span style="color:${isCorrect ? 'var(--success)' : 'var(--error)'}">${msg}</span>`;
        uiFeedback.style.opacity = 1;
    }

    function highlightKey(k) {
        clearKbHighlights();
        let el = document.getElementById('key-' + k);
        if(el) el.classList.add('hint-glow');
    }
    function clearKbHighlights() {
        document.querySelectorAll('.key').forEach(el => el.classList.remove('hint-glow'));
    }

    function updateStats() {
        document.getElementById('score').textContent = score;
        const acc = attempts === 0 ? 0 : Math.round((score / attempts) * 100);
        document.getElementById('acc').textContent = acc;
    }

    function endGame(force) {
        clearInterval(examInterval);
        clearInterval(practiceInterval);
        clearTimeout(idleTimeout);
        timerContainer.style.display = 'none';
        
        if(!force && currentMode === 'exam') {
            const examSecs = parseInt(document.getElementById('exam-time').value);
            const rpm = Math.round(score / (examSecs / 60));
            const acc = document.getElementById('acc').textContent;
            
            let grade = 'C', gClass = 'grade-C', remark = "尚待加強！請先回練習模式熟悉。";
            if(acc >= 90 && rpm >= 40) { grade = 'S'; gClass = 'grade-S'; remark = "神級反應！你已經徹底內化了！"; }
            else if(acc >= 80 && rpm >= 25) { grade = 'A'; gClass = 'grade-A'; remark = "非常熟練！具備實戰打字水準。"; }
            else if(acc >= 70 && rpm >= 15) { grade = 'B'; gClass = 'grade-B'; remark = "基礎紮實！繼續提升肌肉記憶。"; }

            document.getElementById('modal-grade').className = `grade ${gClass}`;
            document.getElementById('modal-grade').textContent = grade;
            document.getElementById('modal-desc').innerHTML = `
                擊發正確數：<b>${score}</b><br>準確率：<b>${acc}%</b><br>
                速度指標：約 <b>${rpm}</b> 字/分鐘<br><br>${remark}
            `;
            document.getElementById('result-modal').style.display = 'flex';
        }
        
        currentMode = 'idle';
        uiDisplay.innerHTML = `<span class="root-text" style="color:#aaa; font-size:30px;">練習結束</span>`;
        uiProgress.innerHTML = ''; uiHint.style.display = 'none'; clearKbHighlights();
    }
</script>

</body>
</html>
